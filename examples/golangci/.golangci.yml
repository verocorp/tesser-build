# Enable the bundled tessercheck analyzers (the "tessercheck" custom linter) in your
# golangci-lint run — in CI and, via the custom binary, in your editor on save.
# This enables tessercheck alongside whatever else you run; to try it in isolation,
# add `default: none` under linters.
version: "2"
linters:
  enable:
    - tessercheck
  settings:
    custom:
      tessercheck:
        type: module
        description: DDD value-object analyzers (tessercheck)
# tessercheck reads its exclude list from .tesser-build.yaml at the repo root — the same
# file the standalone `tessercheck` / `go tool tessercheck` uses. Excludes are NOT
# duplicated here; .tesser-build.yaml stays the single config source.
