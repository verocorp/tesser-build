# Human-ratified exclude list for the value-object heuristic (see
# internal/voscan/config.go). ddd-vet walks up from each package to the nearest
# .go-ddd.yaml, so this one scopes the excludes to the decision-2 (public-interface)
# changeability anchor.
#
#   - Order is the domain ENTITY: identity is by ID (see Order.Equal), not by
#     attributes; it is constructed through NewOrder(OrderSpec) but is not a value
#     object, so it gets no Must*/String requirement.
#   - RawOrderLocator is a COUPLED violation arm (a service-locator that reaches
#     through to backend rows); it is not a value object.
exclude:
  - Order
  - RawOrderLocator
