name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: tessercheck on examples/ddd (dogfood the consumer configuration)
        # examples/ddd is the acceptance-gate output and the canonical worked
        # example consumers imitate; running tessercheck on it with its own
        # .tesser-build.yaml exclude list exercises the exact consumer setup and
        # keeps the example from silently drifting out of conformance.
        run: go run ./cmd/tessercheck ./examples/ddd/

  plugin:
    # Proves gclplugin/ actually bundles into a golangci-lint v2 custom binary
    # and the tessercheck linter runs end-to-end — the editor-integration path that
    # `go test ./...` cannot exercise (no golangci-lint on PATH there, so the
    # TestCustomGCL test skips in the job above and runs only here).
    name: golangci-lint plugin bundling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Put GOPATH/bin on PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Plugin bundling smoke test
        run: go test ./gclplugin/ -run CustomGCL -v

  python-example:
    # Gates the Python worked example at the same bar as the Go mechanics:
    # mypy --strict and pytest must both be clean, so skills/tesser-build/python.md never
    # encodes a pattern that isn't backed by running, type-checked code.
    # examples/python is the reference rendering.
    name: python example (mypy --strict + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r examples/python/requirements-dev.txt
      - name: examples/python — mypy --strict + pytest
        working-directory: examples/python
        run: |
          MYPYPATH=. mypy --strict campaign campaignapp linkcampaign linkcampaignimpl transport catalog serialization.py main.py tests conftest.py
          pytest -q

  python-app-example:
    # Gates the composition-root / wiring worked example (Python) at the same bar:
    # mypy --strict + pytest. Proves the bounded-context anatomy + srv/config/
    # bootstrap model in running, type-checked code before it is taught, and runs
    # the example's own self-enforcement tests (env-edge, exits, import-time side
    # effects, directional import guard). A Go mirror (examples/app) is planned,
    # not yet built.
    name: python-app example (mypy --strict + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r examples/python-app/requirements-dev.txt
      - name: examples/python-app — mypy --strict + pytest
        working-directory: examples/python-app
        run: |
          MYPYPATH=. mypy --strict errors.py lifecycle.py serialization.py campaign linkpolicy reports bootstrap srv tests conftest.py
          pytest -q

  serdepy-example:
    # Gates the serialization-norm worked example (Python) at the same bar:
    # mypy --strict + pytest. Shows every canonical-exit case in running code
    # (all four conversion dunders, the Decimal and datetime text policies,
    # zero-dunder compound, parts with a derived field diverging from the
    # spec, an edge golden) — the all-cases companion to python-app's
    # production-shaped parts impl.
    name: serdepy example (mypy --strict + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r examples/serdepy/requirements-dev.txt
      - name: examples/serdepy — mypy --strict + pytest
        working-directory: examples/serdepy
        run: |
          MYPYPATH=. mypy --strict serialization.py parcel.py parts.py wire.py conftest.py tests
          pytest -q

  errorspy-example:
    # Gates the error-norms worked example (Python) at the same bar: mypy
    # --strict + pytest. Proves the error-handling conventions in running,
    # type-checked code before they are taught. A Go mirror (examples/errorsgo)
    # is in progress on branch errorsgo-mirror, not yet on main.
    name: errorspy example (mypy --strict + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r examples/errorspy/requirements-dev.txt
      - name: examples/errorspy — mypy --strict + pytest
        working-directory: examples/errorspy
        run: |
          MYPYPATH=. mypy --strict errors.py conftest.py domain app transport main.py tests
          pytest -q

  roadmap:
    # The roadmap matrix is generated, never hand-maintained (Wave 2 item 10):
    # this job fails when the committed rendering drifts from the derivation,
    # when a tb-cell/tb-status annotation is malformed, when a stub doc lacks
    # the 2A disclaimer, or when a living surface references a nonexistent
    # path. Needs Go (the analyzers.All JSON bridge) and Python (the
    # stdlib-only generator + its 6A test suite).
    name: roadmap (generated matrix + annotation checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r tessercheck-py/requirements-dev.txt
      - name: Generated roadmap is current (drift check)
        run: python3 roadmap/generate.py --check
      - name: roadmap generator — mypy --strict + pytest
        working-directory: roadmap
        run: |
          MYPYPATH=../tessercheck-py mypy --strict generate.py tests/test_generate.py
          pytest tests -q

  tessercheck-py:
    # The Python analog of tessercheck: gates tessercheck-py at the same bar as the Go
    # analyzers (mypy --strict + pytest). Its pytest suite includes the
    # acceptance gate that the analyzer is clean on examples/python — the Python
    # counterpart of "tessercheck on examples/ddd" in the go job above.
    name: tessercheck-py (mypy --strict + pytest + examples/python gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r tessercheck-py/requirements-dev.txt
      - name: tessercheck-py — mypy --strict + pytest
        working-directory: tessercheck-py
        run: |
          mypy
          pytest -q
      - name: tessercheck-py on examples/python (explicit CLI gate)
        run: python -m tessercheck examples/python
        working-directory: .
        env:
          PYTHONPATH: tessercheck-py
      # Full acceptance gate on the verified impl: discovery (the totality
      # guard must find campaign, linkpolicy, reports with zero
      # configuration; discovery errors exit 2) AND every check clean —
      # python-app's former TB010 nonconformance (Slug/TargetURL public
      # `value`) is fixed, so nothing is scoped out anymore.
      - name: tessercheck-py full gate on examples/python-app (--app-root)
        run: python -m tessercheck --app-root examples/python-app
        working-directory: .
        env:
          PYTHONPATH: tessercheck-py
      - name: tessercheck-py on examples/serdepy (explicit CLI gate)
        run: python -m tessercheck examples/serdepy
        working-directory: .
        env:
          PYTHONPATH: tessercheck-py
      # errorspy joins the fully-gated trees: its DateWindow was swept to the
      # serialization norm (spec construction, no compound dunder) so the repo
      # no longer contains code that violates a check it ships. The raw-date
      # bounds are conformant under the current primitive set; if date/datetime
      # are ruled into it (TODOS.md), DateWindow's bounds get wrapped in the
      # same change and this gate keeps it honest.
      - name: tessercheck-py on examples/errorspy (explicit CLI gate)
        run: python -m tessercheck examples/errorspy
        working-directory: .
        env:
          PYTHONPATH: tessercheck-py
