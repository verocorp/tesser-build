name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt (must be clean)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: ddd-vet on examples/ddd (dogfood the consumer configuration)
        # examples/ddd is the acceptance-gate output and the canonical worked
        # example consumers imitate; running ddd-vet on it with its own
        # .go-ddd.yaml exclude list exercises the exact consumer setup and
        # keeps the example from silently drifting out of conformance.
        run: go run ./cmd/ddd-vet ./examples/ddd/

  plugin:
    # Proves gclplugin/ actually bundles into a golangci-lint v2 custom binary
    # and the dddvet linter runs end-to-end — the editor-integration path that
    # `go test ./...` cannot exercise (no golangci-lint on PATH there, so the
    # TestCustomGCL test skips in the job above and runs only here).
    name: golangci-lint plugin bundling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Put GOPATH/bin on PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Plugin bundling smoke test
        run: go test ./gclplugin/ -run CustomGCL -v

  python-example:
    # Gates the Python worked examples at the same bar as the Go mechanics:
    # mypy --strict and pytest must both be clean, so skills/ddd/python.md never
    # encodes a pattern that isn't backed by running, type-checked code.
    # examples/python is the reference rendering; examples/python-expenses is the
    # fresh-agent acceptance-gate output.
    name: python examples (mypy --strict + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev tooling
        run: pip install -r examples/python/requirements-dev.txt
      - name: examples/python — mypy --strict + pytest
        working-directory: examples/python
        run: |
          MYPYPATH=. mypy --strict campaign campaignapp linkcampaign linkcampaignimpl transport catalog main.py tests conftest.py
          pytest -q
      - name: examples/python-expenses — mypy --strict + pytest
        working-directory: examples/python-expenses
        run: |
          MYPYPATH=. mypy --strict .
          pytest -q
